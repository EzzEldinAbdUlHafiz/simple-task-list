services:
  postgres:
    image: postgres:16-alpine
    container_name: task-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - task-manager-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./server
    container_name: task-backend
    environment:
      # Use the service name 'postgres' instead of 'localhost'
      DATABASE_URL: ${DATABASE_URL}
      PORT: ${BACKEND_API_PORT}
    networks:
      - task-manager-network
    ports:
      - "${BACKEND_API_PORT}:3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_API_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./client
    container_name: task-frontend
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - task-manager-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    
networks:
  task-manager-network:
    driver: bridge

volumes:
  postgres_data:
